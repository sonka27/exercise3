<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        background-color: #fcfbfa;
        font-family: 'Arial';
        color: #2c2520;
        margin: 0;
    }
    .content {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 20px;
        text-align: center;
    }
    .title {
        font-size: 2.5rem;
        font-weight: 800;
        color: #3d2514;
        margin-bottom: 0.5rem;
    }
    .subtitle {
        font-size: 1.1rem;
        font-weight: 400;
        color: #746458;
        margin-bottom: 3rem;
        line-height: 1.5;
    }
    .plans {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1.5rem;
        margin-top: 2rem;
    }
    .plan {
        background-color: #ffffff;
        border: 2px solid #e6e1da;
        color: white;
        border-radius: 10px;
        padding: 2rem 1.5rem;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
    }
    .plan:hover {
        border-color: #d4a373;
        transform: translateY(-4px);
        box-shadow: 0 10px 20px rgba(61, 37, 20, 0.05);
    }
    .plan .description .title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #3d2514;
    }
    </style>
</head>
<body>
    <div id="app" class="container mx-auto py-6">
        <div class="content">
            <h1 class="title">Coffee Plans</h1>
            <h2 class="subtitle">
                We travel the world to source the very best single origin coffee for you
            </h2>
            <plan-picker></plan-picker>
            <div class="plans">
                <plan v-for="plan in plans" :name="plan"></plan>
        </div>
    </div>
</div>
    <script type="text/x-template" id="plan-template">
         <div class="plan" :class="{'active-plan': selected}" @click="select">
                    <div class="description">
                        <span class="title">
                            {{name}}
                        </span>
                    </div>
                </div>
    </script>
    <script type="text/x-template" id="plan-picker-template">
        <div class="plans">
            <plan 
            v-for="plan in plans" 
            :name="plan"
            :selected="plan === selectedPlan"
            v-on:select="selectPlan"
            ></plan>
        </div>
    </script>
    <script src="https://unpkg.com/vue@3"></script>
    <script>
        let PlanComponent = {
    template: '#plan-template',
    props:{
        name: {type: String, required: true},
        selected: {type: Boolean, default: false}
    },
    methods:{
        select(){
            this.$emit('select', this.name)
        }
    }
}
let PlanPickerComponent = {
    components: {plan: PlanComponent},
    template: '#plan-picker-template',
    data(){
        return{
            plans:['The Single', 'The Curious', 'The Addict'],
            selectedPlan:null
        }
    },
    methods:{
        selectPlan(plan){
           this.selectedPlan = plan
        }
    }
}
const app = Vue.createApp({
    components: {PlanPicker: PlanPickerComponent}
})
.mount('#app')
    </script>
</body>
</html>
